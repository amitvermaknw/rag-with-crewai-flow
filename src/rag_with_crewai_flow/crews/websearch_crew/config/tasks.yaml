search_articles_task:
  description: >
    Search the web for articles related to: {query}            
    Steps:
    1. Create 2-3 effective search queries based on the topic
    2. Search and collect top 2 most relevant article URLs
    3. Verify each URL is accessible and relevant
    Return a list of URLs with titles and brief descriptions.
  expected_output: >
    A list of 2 relevant articles with:
    - Title
    - URL
    - article details 
  agent: web_searcher

extract_content_task:
  description: >
    From the articles found, scrape and extract full content.
    Steps:
    1. Visit each article URL
    2. Extract the main article text (ignore ads, nav, footer)
    3. Write a 2-3 sentence summary for each article
    4. Structure the output cleanly
  
    Query context: {query}
  expected_output: >
    For each article provide:
    - title
    - url  
    - full content (cleaned)
    - summary (60-70 words)
  agent: content_extractor
